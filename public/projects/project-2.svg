<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099BB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="60" y1="0" x2="60" y2="340"/>
    <line x1="120" y1="0" x2="120" y2="340"/>
    <line x1="180" y1="0" x2="180" y2="340"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="360" y1="0" x2="360" y2="340"/>
    <line x1="420" y1="0" x2="420" y2="340"/>
    <line x1="480" y1="0" x2="480" y2="340"/>
    <line x1="540" y1="0" x2="540" y2="340"/>
  </g>
  <!-- Glow orb left -->
  <circle cx="120" cy="170" r="100" fill="#00D4FF" opacity="0.08"/>
  <!-- Glow orb right -->
  <circle cx="480" cy="170" r="80" fill="#0099BB" opacity="0.08"/>
  <!-- Top bar accent -->
  <rect x="0" y="0" width="600" height="3" fill="url(#accent)" rx="2"/>
  <!-- Browser chrome mockup -->
  <rect x="40" y="40" width="520" height="260" fill="rgba(255,255,255,0.03)" rx="8" stroke="#00D4FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="40" y="40" width="520" height="28" fill="rgba(255,255,255,0.05)" rx="8"/>
  <circle cx="62" cy="54" r="5" fill="#FF5F57"/>
  <circle cx="80" cy="54" r="5" fill="#FEBC2E"/>
  <circle cx="98" cy="54" r="5" fill="#28C840"/>
  <!-- URL bar -->
  <rect x="120" y="46" width="300" height="16" fill="rgba(255,255,255,0.05)" rx="8"/>
  <text x="270" y="58" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="8">github.com/waqas-uddin/voucher-mall</text>
  <!-- Content area icon -->
  <text x="300" y="160" text-anchor="middle" font-size="52" filter="url(#glow)">��️</text>
  <!-- Title -->
  <text x="300" y="205" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">Voucher Mall</text>
  <!-- Tech badge -->
  <rect x="230" y="218" width="140" height="24" fill="#00D4FF" opacity="0.2" rx="12" stroke="#00D4FF" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="300" y="234" text-anchor="middle" fill="#00D4FF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Spring Boot + React</text>
  <!-- Decorative dots -->
  <circle cx="490" cy="310" r="3" fill="#00D4FF" opacity="0.5"/>
  <circle cx="505" cy="310" r="3" fill="#0099BB" opacity="0.5"/>
  <circle cx="520" cy="310" r="3" fill="#00D4FF" opacity="0.5"/>
</svg>